# GhostMap — orquestração completa
# Sobe: postgres, neo4j, redis, mitmproxy, backend, frontend, worker (consumers).
# Uso: docker compose up -d
# Healthchecks garantem ordem de boot.

x-backend-env: &backend-env
  POSTGRES_DSN: postgresql+asyncpg://ghostmap:${POSTGRES_PASSWORD:-ghostmap}@postgres:5432/ghostmap
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-ghostmap_neo4j}
  REDIS_URL: redis://redis:6379/0
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
  GHOSTMAP_ENV: ${GHOSTMAP_ENV:-dev}
  GHOSTMAP_SECRET: ${GHOSTMAP_SECRET:-change-me-in-production}
  PYTHONPATH: /workspace

x-backend-volumes: &backend-volumes
  - ./backend:/app
  - ./capture:/workspace/capture

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ghostmap
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ghostmap}
      POSTGRES_DB: ghostmap
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/postgres:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghostmap -d ghostmap"]
      interval: 5s
      timeout: 3s
      retries: 20

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-ghostmap_neo4j}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      # Não montar migrations em /import:ro — o entrypoint do Neo4j faz chown
      # nesse diretório e falha em FS read-only (crash loop). Constraints rodam
      # via scripts/bootstrap.sh com cypher-shell + arquivo no host.
    ports:
      - "7474:7474"   # browser
      - "7687:7687"   # bolt
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "1gb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
      GHOSTMAP_ROLE: api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes: *backend-volumes
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  worker:
    # Mesmo image do backend, mas roda os event consumers em vez do HTTP server.
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
      GHOSTMAP_ROLE: worker
    depends_on:
      backend:
        condition: service_started
    volumes: *backend-volumes
    command: ["python", "-m", "app.workers.runner"]

  mitmproxy:
    build:
      context: ./capture
      dockerfile: Dockerfile.proxy
    restart: unless-stopped
    # Entrypoint oficial tenta `gosu mitmproxy`; em alguns kernels (ex. Kali)
    # isso falha com "operation not permitted". Roda como root em dev.
    user: root
    entrypoint: ["mitmweb"]
    environment:
      REDIS_URL: redis://redis:6379/0
      GHOSTMAP_BACKEND_URL: http://backend:8000
      GHOSTMAP_PROJECT_ID: ${GHOSTMAP_DEFAULT_PROJECT_ID:-}
    ports:
      - "8080:8080"    # proxy port
      - "8081:8081"    # mitmweb UI
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./capture/proxy:/addon
      - mitm_certs:/root/.mitmproxy
    command:
      - --web-host
      - 0.0.0.0
      - --listen-host
      - 0.0.0.0
      - --listen-port
      - "8080"
      - --set
      - web_port=8081
      - --set
      - web_open_browser=false
      - -s
      - /addon/mitm_addon.py

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
      NEXT_PUBLIC_DEFAULT_PROJECT_ID: ${GHOSTMAP_DEFAULT_PROJECT_ID:-}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: ["npm", "run", "dev"]

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  mitm_certs:

networks:
  default:
    name: ghostmap-net
