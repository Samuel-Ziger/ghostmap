# Alembic minimalista — para producao, expandir.
[alembic]
script_location = alembic
sqlalchemy.url = postgresql+asyncpg://ghostmap:ghostmap@postgres:5432/ghostmap

[loggers]
keys = root

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = INFO
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
